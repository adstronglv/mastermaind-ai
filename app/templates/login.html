<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AdStrong LV</title>
    <meta name="description" content="Log in to your AdStrong LV account">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    <!-- Header -->
    <header class="border-b border-white/10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-xl">A</span>
                </div>
                <span class="text-white font-bold text-xl">AdStrong LV</span>
            </a>
            <nav class="flex items-center gap-4">
                <a href="/signup" class="text-gray-300 hover:text-white transition" data-i18n="signup_link">Sign Up</a>
                <div class="flex items-center gap-1 ml-4 bg-white/10 rounded-lg p-1">
                    <button onclick="setLanguage('en')" id="lang-en" class="px-2 py-1 rounded text-sm font-medium transition bg-pink-500 text-white">EN</button>
                    <button onclick="setLanguage('de')" id="lang-de" class="px-2 py-1 rounded text-sm font-medium transition text-gray-400 hover:text-white">DE</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Login Form -->
    <main class="max-w-md mx-auto px-4 py-20">
        <div class="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-8">
            <h1 class="text-3xl font-bold text-white mb-2 text-center" data-i18n="login_title">Welcome Back</h1>
            <p class="text-gray-400 text-center mb-8" data-i18n="login_subtitle">Log in to your account</p>

            <!-- Error Message -->
            <div id="error-message" class="hidden bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-lg mb-6">
                <span id="error-text"></span>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden bg-green-500/20 border border-green-500/50 text-green-300 px-4 py-3 rounded-lg mb-6">
                <span id="success-text"></span>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="email_label">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="password_label">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
                        placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btn-text" data-i18n="login_button">Log In</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-400">
                    <span data-i18n="no_account">Don't have an account?</span>
                    <a href="/signup" class="text-purple-400 hover:text-purple-300 font-medium" data-i18n="signup_link">Sign Up</a>
                </p>
            </div>

            <div class="mt-4 text-center">
                <a href="#" id="forgot-password-link" class="text-sm text-gray-500 hover:text-gray-400" data-i18n="forgot_password">Forgot your password?</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-8 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-500">
            <div class="flex justify-center gap-6 mb-4">
                <a href="/impressum" class="hover:text-gray-300 transition">Impressum</a>
                <a href="/datenschutz" class="hover:text-gray-300 transition">Datenschutz</a>
                <a href="/terms" class="hover:text-gray-300 transition">Terms</a>
            </div>
            <p>&copy; 2026 AdStrong LV. Powered by Claude AI.</p>
        </div>
    </footer>

    <script src="/static/js/auth.js"></script>
    <script>
        let currentLanguage = localStorage.getItem('adstrong_lang') || 'en';

        const translations = {
            en: {
                login_title: "Welcome Back",
                login_subtitle: "Log in to your account",
                email_label: "Email",
                password_label: "Password",
                login_button: "Log In",
                no_account: "Don't have an account?",
                signup_link: "Sign Up",
                forgot_password: "Forgot your password?",
                login_success: "Login successful! Redirecting...",
                login_error: "Invalid email or password"
            },
            de: {
                login_title: "Willkommen zurück",
                login_subtitle: "Melden Sie sich bei Ihrem Konto an",
                email_label: "E-Mail",
                password_label: "Passwort",
                login_button: "Anmelden",
                no_account: "Noch kein Konto?",
                signup_link: "Registrieren",
                forgot_password: "Passwort vergessen?",
                login_success: "Anmeldung erfolgreich! Weiterleitung...",
                login_error: "Ungültige E-Mail oder Passwort"
            }
        };

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('adstrong_lang', lang);
            applyLanguage(lang);

            const enBtn = document.getElementById('lang-en');
            const deBtn = document.getElementById('lang-de');
            if (lang === 'en') {
                enBtn.className = 'px-2 py-1 rounded text-sm font-medium transition bg-pink-500 text-white';
                deBtn.className = 'px-2 py-1 rounded text-sm font-medium transition text-gray-400 hover:text-white';
            } else {
                deBtn.className = 'px-2 py-1 rounded text-sm font-medium transition bg-pink-500 text-white';
                enBtn.className = 'px-2 py-1 rounded text-sm font-medium transition text-gray-400 hover:text-white';
            }
        }

        function applyLanguage(lang) {
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            setLanguage(currentLanguage);

            // Check if already logged in
            if (window.auth && window.auth.isLoggedIn()) {
                window.location.href = '/dashboard';
                return;
            }

            const form = document.getElementById('login-form');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const submitBtn = document.getElementById('submit-btn');
                const btnText = document.getElementById('btn-text');
                const btnLoading = document.getElementById('btn-loading');
                const errorDiv = document.getElementById('error-message');
                const successDiv = document.getElementById('success-message');

                // Show loading
                submitBtn.disabled = true;
                btnText.classList.add('hidden');
                btnLoading.classList.remove('hidden');
                errorDiv.classList.add('hidden');
                successDiv.classList.add('hidden');

                try {
                    await window.auth.signIn(email, password);

                    // Show success
                    successDiv.classList.remove('hidden');
                    document.getElementById('success-text').textContent = translations[currentLanguage].login_success;

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);

                } catch (error) {
                    // Show error
                    errorDiv.classList.remove('hidden');
                    document.getElementById('error-text').textContent = error.message || translations[currentLanguage].login_error;

                    // Reset button
                    submitBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    btnLoading.classList.add('hidden');
                }
            });

            // Password reset link
            document.getElementById('forgot-password-link').addEventListener('click', async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                if (!email) {
                    alert('Please enter your email first');
                    return;
                }

                try {
                    await window.auth.resetPassword(email);
                    alert('Password reset email sent! Check your inbox.');
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
