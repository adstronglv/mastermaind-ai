services:
  - type: web
    name: prompt-engineer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_NAME
        value: PromptEngineer
      - key: DEBUG
        value: false
